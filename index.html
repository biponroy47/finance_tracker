<!DOCTYPE html>
<html>
  <head>
    <title>Expense Tracker</title>
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1" />
    <meta
      name="theme-color"
      content="#f4f7f5" />
    <style>
      :root {
        color-scheme: light;
        --accent-color: #195f56;
        --accent-dark: #124942;
        --accent-soft: #e7f1ed;
        --success-color: #1f7a4d;
        --error-color: #b42318;
        --border-color: #d9e2dc;
        --background-color: #f4f7f5;
        --surface-color: #ffffff;
        --muted-surface: #eef3f0;
        --text-color: #202522;
        --muted-text: #69746e;
        --shadow-color: rgba(31, 33, 29, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      html {
        background: var(--background-color);
      }

      body {
        min-height: 100vh;
        margin: 0;
        background:
          linear-gradient(180deg, rgba(231, 241, 237, 0.75), transparent 250px),
          var(--background-color);
        color: var(--text-color);
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto,
          Helvetica, Arial, sans-serif;
      }

      .app-shell {
        width: min(100%, 820px);
        margin: 0 auto;
        padding: 18px 14px 28px;
      }

      .app-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 14px;
        padding: 8px 2px 16px;
      }

      h1,
      h2,
      h3 {
        margin: 0;
        color: var(--text-color);
        font-weight: 650;
        letter-spacing: 0;
      }

      h1 {
        font-size: 31px;
        line-height: 1.04;
      }

      h2 {
        font-size: 18px;
        line-height: 1.2;
      }

      h3 {
        margin: 18px 0 10px;
        font-size: 15px;
        line-height: 1.2;
      }

      .currency-pill {
        flex: 0 0 auto;
        display: inline-flex;
        align-items: center;
        min-height: 32px;
        padding: 0 11px;
        border: 1px solid rgba(25, 95, 86, 0.2);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.72);
        color: var(--accent-dark);
        font-size: 13px;
        font-weight: 700;
      }

      .form-section,
      .report-section {
        margin-bottom: 14px;
        padding: 16px;
        border: 1px solid rgba(217, 226, 220, 0.92);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.96);
        box-shadow: 0 12px 28px var(--shadow-color);
      }

      .section-heading {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 14px;
      }

      .form-row {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 10px;
        margin-bottom: 11px;
      }

      .form-row.single {
        grid-template-columns: 1fr;
      }

      label,
      .choice-section legend {
        display: block;
        margin-bottom: 6px;
        color: var(--muted-text);
        font-size: 12px;
        font-weight: 700;
        line-height: 1.2;
        text-transform: uppercase;
      }

      input[type='date'],
      input[type='text'],
      input[type='number'],
      select {
        width: 100%;
        min-height: 46px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: #ffffff;
        color: var(--text-color);
        font: inherit;
        font-size: 16px;
        line-height: 1.3;
        padding: 11px 12px;
        -webkit-appearance: none;
        appearance: none;
        transition:
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          background-color 0.16s ease;
      }

      input::placeholder {
        color: #9aa39e;
      }

      select {
        padding-right: 38px;
        background-image: url("data:image/svg+xml;charset=UTF-8,%3Csvg xmlns='http://www.w3.org/2000/svg' width='20' height='20' viewBox='0 0 24 24' fill='none' stroke='%2369746e' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='m6 9 6 6 6-6'/%3E%3C/svg%3E");
        background-repeat: no-repeat;
        background-position: right 12px center;
        background-size: 18px;
      }

      input:focus,
      select:focus,
      button:focus-visible {
        outline: none;
        border-color: var(--accent-color);
        box-shadow: 0 0 0 3px rgba(25, 95, 86, 0.13);
      }

      button {
        width: 100%;
        min-height: 46px;
        border: 1px solid transparent;
        border-radius: 8px;
        background: var(--accent-color);
        color: #ffffff;
        cursor: pointer;
        font: inherit;
        font-size: 16px;
        font-weight: 700;
        line-height: 1.15;
        padding: 12px 15px;
        transition:
          background-color 0.16s ease,
          border-color 0.16s ease,
          box-shadow 0.16s ease,
          opacity 0.16s ease,
          transform 0.16s ease;
      }

      button:hover {
        background: var(--accent-dark);
      }

      button:active {
        transform: translateY(1px);
      }

      button:disabled {
        cursor: not-allowed;
        opacity: 0.58;
        transform: none;
      }

      .choice-section {
        margin: 0 0 13px;
        padding: 0;
        border: 0;
      }

      .choice-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(96px, 1fr));
        gap: 8px;
      }

      .choice-button {
        min-height: 40px;
        padding: 9px 8px;
        border-color: transparent;
        background: var(--muted-surface);
        color: var(--text-color);
        font-size: 14px;
        font-weight: 650;
        line-height: 1.15;
        text-align: center;
        white-space: normal;
      }

      .choice-button:hover {
        border-color: rgba(25, 95, 86, 0.2);
        background: #e3ebe6;
      }

      .choice-button[aria-pressed='true'] {
        border-color: rgba(25, 95, 86, 0.38);
        background: var(--accent-soft);
        color: var(--accent-dark);
        box-shadow: inset 0 0 0 1px rgba(25, 95, 86, 0.22);
      }

      .submit-area {
        position: relative;
        overflow: hidden;
        margin-top: 2px;
        border-radius: 8px;
      }

      .submit-progress {
        position: absolute;
        inset: auto 0 0;
        height: 3px;
        overflow: hidden;
        background: rgba(255, 255, 255, 0.28);
        opacity: 0;
      }

      .submit-progress::before {
        content: '';
        position: absolute;
        inset: 0;
        width: 44%;
        background: rgba(255, 255, 255, 0.95);
        transform: translateX(-100%);
      }

      .submit-area.is-submitting .submit-progress {
        opacity: 1;
      }

      .submit-area.is-submitting .submit-progress::before {
        animation: submit-progress 1.05s ease-in-out infinite;
      }

      @keyframes submit-progress {
        from {
          transform: translateX(-105%);
        }
        to {
          transform: translateX(235%);
        }
      }

      .toast {
        position: fixed;
        right: 14px;
        bottom: 14px;
        left: 14px;
        z-index: 10;
        max-width: 520px;
        margin: 0 auto;
        padding: 12px 14px;
        border-radius: 8px;
        color: #ffffff;
        font-size: 15px;
        font-weight: 650;
        line-height: 1.3;
        opacity: 0;
        pointer-events: none;
        transform: translateY(14px);
        transition:
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .toast.is-visible {
        opacity: 1;
        transform: translateY(0);
      }

      .toast.success {
        background: var(--success-color);
      }

      .toast.error {
        background: var(--error-color);
      }

      .report-period {
        margin: -7px 0 14px;
        color: var(--muted-text);
        font-size: 14px;
        font-weight: 650;
      }

      #expenseResults {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }

      .chart {
        display: grid;
        gap: 12px;
      }

      .chart-row {
        display: grid;
        gap: 6px;
      }

      .chart-meta {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: 10px;
      }

      .chart-label {
        color: var(--text-color);
        font-size: 13px;
        font-weight: 800;
        line-height: 1.2;
      }

      .chart-numbers {
        color: var(--muted-text);
        font-size: 12px;
        font-weight: 750;
        line-height: 1.2;
        text-align: right;
        white-space: nowrap;
      }

      .chart-track {
        height: 10px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--muted-surface);
      }

      .chart-bar {
        width: var(--bar-width);
        height: 100%;
        border-radius: inherit;
        background: var(--accent-color);
      }

      .summary-total {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-top: 16px;
        padding-top: 13px;
        border-top: 1px solid var(--border-color);
        color: var(--text-color);
        font-size: 14px;
        font-weight: 800;
      }

      table {
        width: 100%;
        min-width: 520px;
        border-collapse: separate;
        border-spacing: 0;
        margin-top: 10px;
        overflow: hidden;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: #ffffff;
        font-size: 14px;
      }

      th,
      td {
        padding: 11px 12px;
        border-bottom: 1px solid var(--border-color);
        text-align: left;
        vertical-align: top;
      }

      th {
        background: var(--muted-surface);
        color: var(--muted-text);
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
      }

      tr:last-child td {
        border-bottom: 0;
      }

      .summary {
        margin-top: 0;
      }

      .error {
        margin: 0;
        padding: 12px;
        border: 1px solid rgba(180, 35, 24, 0.22);
        border-radius: 8px;
        background: #fff0ed;
        color: var(--error-color);
        font-weight: 650;
      }

      .loading,
      #expenseResults > p:not(.error) {
        margin: 0;
        padding: 18px 0 4px;
        color: var(--muted-text);
        font-size: 14px;
      }

      @media (max-width: 600px) {
        .app-shell {
          padding: 14px 10px 24px;
        }

        .app-header {
          padding-bottom: 12px;
        }

        h1 {
          font-size: 28px;
        }

        .form-section,
        .report-section {
          padding: 14px;
        }

        .form-row {
          grid-template-columns: 1fr;
          gap: 9px;
          margin-bottom: 10px;
        }

        .form-row.paired-row {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .choice-grid {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }

        .choice-button {
          min-height: 38px;
          padding: 8px 6px;
          font-size: 13px;
        }
      }

    </style>
  </head>
  <body>
    <main class="app-shell">
      <header class="app-header">
        <h1>Expense Tracker</h1>
        <span class="currency-pill">CAD</span>
      </header>

      <div class="form-section">
        <div class="section-heading">
          <h2>Add Transaction</h2>
        </div>
        <form
          id="dataForm"
          autocomplete="off"
          novalidate>
          <div class="form-row single">
            <div class="form-group">
              <label for="description">Description</label>
              <input
                type="text"
                id="description"
                placeholder="Enter description"
                autocomplete="off"
                required />
            </div>
          </div>

          <div class="form-row paired-row">
            <div class="form-group">
              <label for="amount">Amount</label>
              <input
                type="number"
                id="amount"
                placeholder="0.00"
                step="0.01"
                inputmode="decimal"
                required />
            </div>
            <div class="form-group">
              <label for="date">Date</label>
              <input
                type="date"
                id="date"
                required />
            </div>
          </div>

          <fieldset class="choice-section">
            <legend>Payment Method</legend>
            <input
              type="hidden"
              id="paymentMethod"
              required />
            <div
              class="choice-grid"
              data-choice-group="paymentMethod">
              <button
                type="button"
                class="choice-button"
                data-value="Cash/ET"
                aria-pressed="false">
                Cash/ET
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="TD Debit"
                aria-pressed="false">
                TD Debit
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="TD Credit"
                aria-pressed="false">
                TD Credit
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="RBC Credit"
                aria-pressed="false">
                RBC Credit
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Amex Credit"
                aria-pressed="false">
                Amex
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Neo Credit"
                aria-pressed="false">
                Neo
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Capital One Credit"
                aria-pressed="false">
                Capital One
              </button>
            </div>
          </fieldset>

          <fieldset class="choice-section">
            <legend>Category</legend>
            <input
              type="hidden"
              id="category"
              required />
            <div
              class="choice-grid"
              data-choice-group="category">
              <button
                type="button"
                class="choice-button"
                data-value="Food"
                aria-pressed="false">
                Food
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Groceries"
                aria-pressed="false">
                Groceries
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Transportation"
                aria-pressed="false">
                Transport
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Shopping"
                aria-pressed="false">
                Shopping
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Beer"
                aria-pressed="false">
                Beer
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Bars"
                aria-pressed="false">
                Bars
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Subscriptions"
                aria-pressed="false">
                Subs
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Entertainment"
                aria-pressed="false">
                Fun
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Rent"
                aria-pressed="false">
                Rent
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Fees"
                aria-pressed="false">
                Fees
              </button>
              <button
                type="button"
                class="choice-button"
                data-value="Other"
                aria-pressed="false">
                Other
              </button>
            </div>
          </fieldset>

          <div
            class="submit-area"
            id="submitArea">
            <button
              type="submit"
              id="submitButton">
              Add Transaction
            </button>
            <div
              class="submit-progress"
              aria-hidden="true"></div>
          </div>
        </form>
      </div>

      <div
        id="toast"
        class="toast"
        role="status"
        aria-live="polite"></div>

      <div class="report-section">
        <div class="section-heading">
          <h2>Expense Report</h2>
        </div>
        <p
          id="reportPeriod"
          class="report-period"></p>

        <div id="expenseResults">
          <!-- Results will appear here -->
        </div>
      </div>
    </main>

    <script src="config.js"></script>
    <script>

      const currencyFormatter = new Intl.NumberFormat('en-CA', {
        style: 'currency',
        currency: 'CAD',
      })

      function createElement(tagName, textContent, className) {
        const element = document.createElement(tagName)
        if (textContent !== undefined) {
          element.textContent = textContent
        }
        if (className) {
          element.className = className
        }
        return element
      }

      function createTable(headers, rows) {
        const table = document.createElement('table')
        const headerRow = document.createElement('tr')

        headers.forEach((header) => {
          headerRow.appendChild(createElement('th', header))
        })
        table.appendChild(headerRow)

        rows.forEach((row) => {
          const tableRow = document.createElement('tr')
          row.forEach((cell) => {
            tableRow.appendChild(createElement('td', cell))
          })
          table.appendChild(tableRow)
        })

        return table
      }

      function showError(container, message) {
        container.replaceChildren(createElement('p', message, 'error'))
      }

      function getScriptUrl() {
        if (!SCRIPT_URL) {
          throw new Error('Missing Apps Script URL.')
        }
        return SCRIPT_URL
      }

      function formatDate(value) {
        if (/^\d{4}-\d{2}-\d{2}$/.test(value)) {
          const [year, month, day] = value.split('-').map(Number)
          return new Date(year, month - 1, day).toLocaleDateString()
        }

        const date = new Date(value)
        if (Number.isNaN(date.getTime())) {
          return value || ''
        }
        return date.toLocaleDateString()
      }

      function formatAmount(value) {
        const amount = Number(value)
        if (!Number.isFinite(amount)) {
          return currencyFormatter.format(0)
        }
        return currencyFormatter.format(amount)
      }

      async function readJsonResponse(response) {
        const text = await response.text()
        if (!response.ok) {
          throw new Error(text || `Request failed with status ${response.status}`)
        }

        try {
          return JSON.parse(text)
        } catch (error) {
          throw new Error('The server returned invalid JSON.')
        }
      }

      async function readSaveResponse(response) {
        const data = await readJsonResponse(response)
        if (!data.success) {
          throw new Error(data.error || 'The transaction was not saved.')
        }
        return data
      }

      function getTodayInputValue() {
        const today = new Date()
        const year = today.getFullYear()
        const month = String(today.getMonth() + 1).padStart(2, '0')
        const day = String(today.getDate()).padStart(2, '0')
        return `${year}-${month}-${day}`
      }

      function setDefaultDate() {
        document.getElementById('date').value = getTodayInputValue()
      }

      function clearEntryFields() {
        document.getElementById('description').value = ''
        document.getElementById('amount').value = ''
      }

      function getChoiceButtons(inputId) {
        return document.querySelectorAll(`[data-choice-group="${inputId}"] button`)
      }

      function setChoice(inputId, value, persist = true) {
        const input = document.getElementById(inputId)
        input.value = value

        getChoiceButtons(inputId).forEach((button) => {
          button.setAttribute('aria-pressed', String(button.dataset.value === value))
        })

        if (persist) {
          window.localStorage.setItem(`financeTracker.${inputId}`, value)
        }
      }

      function restoreSavedChoices() {
        ;['paymentMethod', 'category'].forEach((inputId) => {
          const savedValue = window.localStorage.getItem(`financeTracker.${inputId}`)
          const hasSavedButton = Array.from(getChoiceButtons(inputId)).some(
            (button) => button.dataset.value === savedValue
          )

          if (savedValue && hasSavedButton) {
            setChoice(inputId, savedValue, false)
          }
        })
      }

      function setupChoiceButtons() {
        document.querySelectorAll('[data-choice-group]').forEach((group) => {
          group.addEventListener('click', (event) => {
            const button = event.target.closest('button[data-value]')
            if (!button) return
            setChoice(group.dataset.choiceGroup, button.dataset.value)
          })
        })
      }

      let toastTimer

      function showToast(message, type = 'success') {
        const toast = document.getElementById('toast')
        window.clearTimeout(toastTimer)
        toast.textContent = message
        toast.className = `toast ${type} is-visible`

        toastTimer = window.setTimeout(() => {
          toast.classList.remove('is-visible')
        }, 2800)
      }

      function setSubmitting(isSubmitting) {
        const submitArea = document.getElementById('submitArea')
        const submitButton = document.getElementById('submitButton')
        submitArea.classList.toggle('is-submitting', isSubmitting)
        submitButton.disabled = isSubmitting
        submitButton.textContent = isSubmitting ? 'Logging...' : 'Add Transaction'
      }

      function resetEntryFields() {
        clearEntryFields()
        setDefaultDate()
        document.getElementById('description').focus()
      }

      function setupEntryFlow() {
        const dateInput = document.getElementById('date')
        const descriptionInput = document.getElementById('description')
        const amountInput = document.getElementById('amount')

        dateInput.addEventListener('change', () => descriptionInput.focus())
        descriptionInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault()
            amountInput.focus()
          }
        })
        amountInput.addEventListener('keydown', (event) => {
          if (event.key === 'Enter') {
            event.preventDefault()
            amountInput.blur()
          }
        })
      }

      function buildExpensesUrl(year, month) {
        const url = new URL(getScriptUrl())
        if (year) {
          url.searchParams.set('year', year)
        }
        if (month) {
          url.searchParams.set('month', month)
        }
        return url.toString()
      }

      function getSampleExpenses(year, month) {
        return SAMPLE_EXPENSES.filter((expense) => {
          const expenseDate = new Date(`${expense.date}T00:00:00`)
          const matchesYear = !year || expenseDate.getFullYear() === Number(year)
          const matchesMonth = !month || expenseDate.getMonth() + 1 === Number(month)
          return matchesYear && matchesMonth
        })
      }

      function buildSampleExpensesData(year, month) {
        const expenses = getSampleExpenses(year, month)
        const categoryTotals = expenses.reduce((totals, expense) => {
          totals[expense.category] = (totals[expense.category] || 0) + expense.amount
          return totals
        }, {})
        const grandTotal = expenses.reduce((total, expense) => total + expense.amount, 0)
        const summary = Object.entries(categoryTotals)
          .sort(([, firstAmount], [, secondAmount]) => secondAmount - firstAmount)
          .map(([category, amount]) => ({
            category,
            amount,
            percentageFormatted: grandTotal
              ? `${((amount / grandTotal) * 100).toFixed(1)}%`
              : '0%',
          }))

        return {
          allTransactions: [
            ['Date', 'Description', 'Amount', 'Payment', 'Category'],
            ...expenses.map((expense) => [
              expense.date,
              expense.description,
              expense.amount,
              expense.tender,
              expense.category,
            ]),
          ],
          summary,
          grandTotal,
        }
      }

      function validateExpensesResponse(data) {
        if (!data || typeof data !== 'object') {
          throw new Error('The server returned an invalid response.')
        }
        if (!Array.isArray(data.allTransactions)) {
          throw new Error('The server response is missing transactions.')
        }
        if (data.summary !== undefined && !Array.isArray(data.summary)) {
          throw new Error('The server response has an invalid summary.')
        }
      }

      function getActiveReportPeriod() {
        const today = new Date()
        return {
          month: today.getMonth() + 1,
          year: today.getFullYear(),
        }
      }

      function formatReportPeriod(year, month) {
        return new Intl.DateTimeFormat('en-CA', {
          month: 'long',
          year: 'numeric',
        }).format(new Date(year, month - 1, 1))
      }

      function createCategoryChart(items, grandTotal) {
        const chart = createElement('div', undefined, 'chart')
        const maxAmount = Math.max(...items.map((item) => Number(item.amount)), 0)

        items.forEach((item) => {
          const amount = Number(item.amount) || 0
          const percentage = grandTotal ? `${((amount / grandTotal) * 100).toFixed(1)}%` : '0%'
          const row = createElement('div', undefined, 'chart-row')
          const meta = createElement('div', undefined, 'chart-meta')
          const label = createElement('span', item.category || '', 'chart-label')
          const numbers = createElement(
            'span',
            `${formatAmount(amount)} | ${percentage}`,
            'chart-numbers'
          )
          const track = createElement('div', undefined, 'chart-track')
          const bar = createElement('div', undefined, 'chart-bar')

          bar.style.setProperty(
            '--bar-width',
            `${maxAmount ? Math.max((amount / maxAmount) * 100, 2) : 0}%`
          )
          meta.append(label, numbers)
          track.appendChild(bar)
          row.append(meta, track)
          chart.appendChild(row)
        })

        return chart
      }

      function renderExpenses(data, container) {
        const elements = []

        if (data.summary && data.summary.length > 0) {
          const summary = createElement('div', undefined, 'summary')
          const total = createElement('div', undefined, 'summary-total')
          const totalLabel = createElement('span', 'Total')
          const totalAmount = createElement('span', formatAmount(data.grandTotal))

          summary.appendChild(createElement('h3', 'Category Summary'))
          summary.appendChild(createCategoryChart(data.summary, data.grandTotal))
          total.append(totalLabel, totalAmount)
          summary.appendChild(total)
          elements.push(summary)
        } else {
          elements.push(createElement('p', 'No transactions found'))
        }

        container.replaceChildren(...elements)
      }

      async function loadActiveMonthExpenses() {
        const { year, month } = getActiveReportPeriod()
        const resultsDiv = document.getElementById('expenseResults')
        const reportPeriod = document.getElementById('reportPeriod')
        const sampleData = buildSampleExpensesData(year, month)
        reportPeriod.textContent = formatReportPeriod(year, month)

        try {
          if (sampleData.allTransactions.length > 1) {
            renderExpenses(sampleData, resultsDiv)
            return
          }

          resultsDiv.replaceChildren(createElement('p', 'Loading...', 'loading'))
          const response = await fetch(buildExpensesUrl(year, month))
          const data = await readJsonResponse(response)
          validateExpensesResponse(data)
          renderExpenses(data, resultsDiv)
        } catch (error) {
          showError(resultsDiv, `Error loading data: ${error.message}`)
        }
      }

      function validateTransaction(data) {
        if (!data.date) {
          throw new Error('Date is required.')
        }
        if (!data.description.trim()) {
          throw new Error('Description is required.')
        }
        if (!Number.isFinite(data.amount) || data.amount <= 0) {
          throw new Error('Amount must be greater than zero.')
        }
        if (!data.tender) {
          throw new Error('Payment method is required.')
        }
        if (!data.category) {
          throw new Error('Category is required.')
        }
      }

      // Initialize
      document.addEventListener('DOMContentLoaded', () => {
        clearEntryFields()
        setDefaultDate()
        restoreSavedChoices()
        setupChoiceButtons()
        setupEntryFlow()
        loadActiveMonthExpenses()
        document.getElementById('description').focus()
      })

      // Form submission
      document
        .getElementById('dataForm')
        .addEventListener('submit', async (e) => {
          e.preventDefault()

          const dateStr = document.getElementById('date').value

          const data = {
            date: dateStr,
            description: document.getElementById('description').value.trim(),
            amount: parseFloat(document.getElementById('amount').value),
            tender: document.getElementById('paymentMethod').value,
            category: document.getElementById('category').value,
          }

          try {
            validateTransaction(data)
            setSubmitting(true)
            const response = await fetch(getScriptUrl(), {
              method: 'POST',
              headers: {
                'Content-Type': 'text/plain;charset=utf-8',
              },
              body: JSON.stringify(data),
            })
            await readSaveResponse(response)
            showToast(`${data.description.toUpperCase()} logged`)
            resetEntryFields()
          } catch (error) {
            showToast(error.message, 'error')
          } finally {
            setSubmitting(false)
          }
        })
    </script>
  </body>
</html>
